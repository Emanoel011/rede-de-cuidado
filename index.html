<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rede de Cuidado - Registros</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Public Sans', sans-serif; }
        .font-fraunces { font-family: 'Fraunces', serif; }
        .table-row:hover { background-color: #1F2A24; }
    </style>
</head>
<body class="bg-[#0F1211] text-gray-200 h-screen overflow-hidden">

    <!-- AUTH SCREEN -->
    <div id="authScreen" class="min-h-screen flex items-center justify-center p-6 bg-[#0F1211]">
        <!-- Seu formulário de login atual (mantive quase igual) -->
        <div class="w-full max-w-[960px] bg-[#1A1F1D] rounded-3xl grid grid-cols-1 md:grid-cols-2 overflow-hidden border border-[#2A3A35]">
            <!-- Lado esquerdo -->
            <div class="bg-gradient-to-br from-[#1A5444] to-[#2A7A64] p-12 hidden md:flex flex-col justify-between">
                <div>
                    <div class="flex items-center gap-2 text-white/90">
                        <i class='bx bx-hive text-2xl'></i>
                        <span class="font-semibold tracking-widest">REDE DE CUIDADO</span>
                    </div>
                    <h1 class="text-4xl font-fraunces leading-tight mt-8">Gestão de Registros</h1>
                </div>
            </div>

            <!-- Lado direito - Forms -->
            <div class="p-10">
                <div id="sysMsg" class="hidden p-4 rounded-2xl mb-6 text-sm"></div>
                
                <!-- Login -->
                <form id="loginForm" onsubmit="doLogin(event)" class="space-y-6">
                    <h2 class="text-3xl font-fraunces">Entrar</h2>
                    <input id="loginEmail" type="email" placeholder="E-mail" required class="w-full bg-[#252B28] border border-[#3A4A44] rounded-2xl px-5 py-3 outline-none focus:border-[#2A7A64]">
                    <input id="loginPass" type="password" placeholder="Senha" required class="w-full bg-[#252B28] border border-[#3A4A44] rounded-2xl px-5 py-3 outline-none focus:border-[#2A7A64]">
                    <button type="submit" class="w-full bg-[#2A7A64] hover:bg-[#1A5444] py-3.5 rounded-2xl font-semibold">Entrar</button>
                </form>

                <!-- Register (adicionei aqui também) -->
                <form id="regForm" onsubmit="doRegister(event)" class="space-y-6 hidden">
                    <h2 class="text-3xl font-fraunces">Criar Conta</h2>
                    <input id="regName" type="text" placeholder="Nome completo" required class="w-full bg-[#252B28] border border-[#3A4A44] rounded-2xl px-5 py-3">
                    <input id="regEmail" type="email" placeholder="E-mail" required class="w-full bg-[#252B28] border border-[#3A4A44] rounded-2xl px-5 py-3">
                    <input id="regPass" type="password" placeholder="Senha" required class="w-full bg-[#252B28] border border-[#3A4A44] rounded-2xl px-5 py-3">
                    <button type="submit" class="w-full bg-[#2A7A64] hover:bg-[#1A5444] py-3.5 rounded-2xl font-semibold">Cadastrar</button>
                </form>
            </div>
        </div>
    </div>

    <!-- APP SCREEN (Table Editor) -->
    <div id="appScreen" class="hidden h-screen grid grid-cols-[280px_1fr]">
        <!-- Sidebar -->
        <div class="bg-[#1A1F1D] border-r border-[#2A3A35] p-6 flex flex-col">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-9 h-9 bg-[#2A7A64] text-white rounded-xl flex items-center justify-center font-bold">R</div>
                <div>
                    <div class="font-fraunces text-xl">Rede de Cuidado</div>
                    <div class="text-xs text-emerald-400">Produção</div>
                </div>
            </div>

            <nav class="space-y-1">
                <a onclick="loadTable()" class="flex items-center gap-3 px-4 py-3 rounded-2xl bg-[#2A3A35] text-white">
                    <i class='bx bx-table'></i>
                    <span class="font-medium">registros</span>
                </a>
            </nav>

            <div class="mt-auto pt-6 border-t border-[#2A3A35]">
                <div class="text-xs text-gray-500 mb-1">Logado como</div>
                <div id="userName" class="font-semibold"></div>
                <button onclick="doLogout()" class="mt-4 text-red-400 hover:text-red-500 text-sm flex items-center gap-2">
                    <i class='bx bx-log-out'></i> Sair
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex flex-col">
            <!-- Top Bar -->
            <div class="h-14 border-b border-[#2A3A35] flex items-center px-6 justify-between bg-[#1A1F1D]">
                <div class="flex items-center gap-4">
                    <h1 class="font-semibold text-lg">public.registros</h1>
                </div>
                <div class="flex items-center gap-3">
                    <input id="searchInput" placeholder="Buscar por chave ou valor..." 
                           class="bg-[#252B28] border border-[#3A4A44] rounded-xl px-4 py-2 w-80 text-sm focus:outline-none">
                    <button onclick="insertNewRow()" 
                            class="bg-[#2A7A64] hover:bg-[#1F5A4A] px-5 py-2 rounded-xl flex items-center gap-2 text-sm font-medium">
                        <i class='bx bx-plus'></i> Novo Registro
                    </button>
                </div>
            </div>

            <!-- Table Area -->
            <div class="flex-1 overflow-auto p-6">
                <table id="dataTable" class="w-full border-collapse text-sm">
                    <thead class="bg-[#1F2522] sticky top-0">
                        <tr>
                            <th class="text-left p-4 border-b border-[#2A3A35]">chave</th>
                            <th class="text-left p-4 border-b border-[#2A3A35]">valor (JSON)</th>
                            <th class="w-32 text-center p-4 border-b border-[#2A3A35]">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-gray-300"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
